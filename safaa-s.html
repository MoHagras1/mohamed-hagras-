<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ذكرى صفاء - كل سنة وأنتي عيدي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f0524;
            --primary-gradient: linear-gradient(45deg, #ff7eb3, #a252ff);
            --button-color: #00d98b;
            --text-secondary: #b0a3c4;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: white;
            font-family: 'Cairo', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            padding-bottom: 80px;
        }

        header {
            width: 90%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
        }

        .logo { font-size: 24px; font-weight: 900; }

        .hero {
            text-align: center;
            padding: 20px;
            max-width: 500px;
            margin-top: 20px;
        }

        .badge {
            background: rgba(255, 255, 255, 0.1);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #d1c4e9;
        }

        h1 {
            font-size: 40px;
            font-weight: 900;
            margin: 15px 0 5px 0;
            line-height: 1.2;
        }

        .sub-title {
            font-size: 22px;
            color: #ff7eb3;
            margin-bottom: 25px;
            font-weight: 700;
            display: block;
        }

        .gradient-text {
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: var(--text-secondary);
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        /* العداد */
        .timer-container {
            margin: 20px 0;
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .timer-title { color: var(--text-secondary); font-size: 13px; margin-bottom: 15px; }

        .timer-digits { display: flex; justify-content: center; gap: 12px; }

        .digit-group { 
            background: rgba(255, 255, 255, 0.03);
            padding: 10px;
            border-radius: 12px;
            min-width: 60px;
        }

        .digit {
            font-size: 28px;
            font-weight: 900;
            color: #00d98b;
        }

        .label { font-size: 11px; color: var(--text-secondary); }

        .cta-btn {
            background-color: var(--button-color);
            color: #000;
            border: none;
            padding: 15px 40px;
            border-radius: 15px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            margin-top: 10px;
        }

        .bottom-nav {
            position: fixed;
            bottom: 20px;
            width: 90%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            display: flex;
            justify-content: space-around;
            padding: 12px;
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .nav-item { text-align: center; font-size: 11px; color: var(--text-secondary); }
    </style>
</head>
<body>

    <header>
        <div class="logo">SecretPage</div>
        <div class="icons">❤️ ✨</div>
    </header>
    <main class="hero">
        <span class="badge">★ ذكرى خاصة لا تُنسى</span>
        <h1>أجمل حياة مع <span class="gradient-text">صفاء</span></h1>
        <span class="sub-title">كل سنة وأنتي عيدي يا حبيبتي</span>
        
        <p>من يوم ما عرفتك والدنيا بقت أحلى، ودي مجرد بداية لرحلتنا سوا..</p>

        <div class="timer-container">
            <div class="timer-title">مرّ على أجمل يوم في حياتي (1-8-2024):</div>
            <div class="timer-digits">
                <div class="digit-group"><div class="digit" id="days">00</div><div class="label">يوم</div></div>
                <div class="digit-group"><div class="digit" id="hours">00</div><div class="label">ساعة</div></div>
                <div class="digit-group"><div class="digit" id="minutes">00</div><div class="label">دقيقة</div></div>
                <div class="digit-group"><div class="digit" id="seconds">00</div><div class="label">ثانية</div></div>
            </div>
        </div>

        <a href="#" class="cta-btn">بحبك يا صفاء ❤️</a>
    </main>

    <nav class="bottom-nav">
        <div class="nav-item">🏠<br>الرئيسية</div>
        <div class="nav-item">📸<br>صورنا</div>
        <div class="nav-item">🎵<br>أغانينا</div>
        <div class="nav-item">💌<br>رسائلي</div>
    </nav>

    <script>
        const startDate = new Date("August 1, 2024 00:00:00").getTime();
        function updateTimer() {
            const now = new Date().getTime();
            const diff = now - startDate;
            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);
            document.getElementById("days").innerText = d;
            document.getElementById("hours").innerText = h.toString().padStart(2, '0');
            document.getElementById("minutes").innerText = m.toString().padStart(2, '0');
            document.getElementById("seconds").innerText = s.toString().padStart(2, '0');
        }
        setInterval(updateTimer, 1000);
        updateTimer();
    </script>
</body>
</html>
