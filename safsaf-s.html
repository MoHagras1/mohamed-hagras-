<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ذكرى حب - صفاء</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #1a0b1e; --accent: #ff4d6d; --text: #fff0f3; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Amiri', serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; }
        #lock-screen { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; transition: 0.5s; }
        .box { background: rgba(255,255,255,0.05); padding: 30px; border-radius: 20px; border: 1px solid var(--accent); text-align: center; box-shadow: 0 0 20px rgba(255, 77, 109, 0.2); }
        input { padding: 12px; border-radius: 10px; border: 1px solid var(--accent); background: #222; color: white; width: 200px; text-align: center; font-size: 18px; margin: 15px 0; outline: none; }
        .login-btn { background: var(--accent); color: white; border: none; padding: 12px 40px; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 18px; }
        #content { display: none; text-align: center; padding: 20px; z-index: 1; }
        .photo { max-width: 250px; border-radius: 50%; border: 5px solid var(--accent); margin: 20px 0; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .timer-grid { display: flex; gap: 10px; justify-content: center; margin-top: 20px; }
        .unit { background: rgba(255,77,109,0.1); padding: 10px; border-radius: 10px; min-width: 65px; border: 1px solid rgba(255,77,109,0.2); }
        .val { font-size: 24px; font-weight: bold; color: var(--accent); }
    </style>
</head>
<body>

    <div id="lock-screen">
        <div class="box">
            <h2 style="color:var(--text)">أدخلي كلمة السر ❤️</h2>
            <input type="password" id="passInput" placeholder="2312008">
            <br>
            <button class="login-btn" onclick="check()">دخول</button>
            <p id="err" style="color:#ff4d6d; display:none; margin-top:15px; font-weight:bold;">كلمة السر غلط يا روحي، جربي تاني!</p>
        </div>
    </div>

    <div id="content">
        <h1>أجمل أيامي معاكي يا صفصف<span style="color:var(--accent)"></span></h1>
        <p style="font-size:24px">كل سنة وأنتي عيدي يا حبيبتي 🫂</p>
        <img src="our-photo.jpg" class="photo" onerror="this.src='https://via.placeholder.com/250?text=Love'">
        <div class="timer-box">
            <p style="font-size:18px">الوقت اللي عشناه سوا من (1-8-2024):</p>
            <div class="timer-grid">
                <div class="unit"><div class="val" id="d">0</div><div>يوم</div></div>
                <div class="unit"><div class="val" id="h">0</div><div>ساعة</div></div>
                <div class="unit"><div class="val" id="m">0</div><div>دقيقة</div></div>
                <div class="unit"><div class="val" id="s">0</div><div>ثانية</div></div>
            </div>
        </div>
        <p style="margin-top:30px; font-size:20px;">أحبكِ دائماً وأبداً ❤</p>
    </div>

    <script>
        function check() {
            const input = document.getElementById('passInput').value.trim();
            // الكود دلوقتي بيقبل الباسورد الطويل أو القصير
            if (input === "2312008" || input === "2008") {
                document.getElementById('lock-screen').style.opacity = "0";
                setTimeout(() => {
                    document.getElementById('lock-screen').style.display = "none";
                    document.getElementById('content').style.display = "block";
                }, 500);
            } else {
                document.getElementById('err').style.display = "block";
                document.getElementById('passInput').value = ""; // بيمسح الغلط عشان تكتب من جديد
            }
        }

        // كود العداد
        const start = new Date("August 1, 2024 00:00:00").getTime();
        setInterval(() => {
            const now = new Date().getTime();
            const diff = now - start;
            document.getElementById("d").innerText = Math.floor(diff / 86400000);
            document.getElementById("h").innerText = Math.floor((diff % 86400000) / 3600000);
            document.getElementById("m").innerText = Math.floor((diff % 3600000) / 60000);
            document.getElementById("s").innerText = Math.floor((diff % 60000) / 1000);
        }, 1000);
    </script>
</body>
</html>
