<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ذكرى حب - صفاء</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #1a0b1e;
            --accent-color: #ff4d6d;
            --text-main: #fff0f3;
            --text-sub: #ffb3c1;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Amiri', serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; overflow-x: hidden; position: relative;
        }

        /* شاشة القفل */
        #login-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color); display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 9999; transition: 0.5s;
        }

        .login-box {
            background: rgba(255, 255, 255, 0.05); padding: 40px 30px;
            border-radius: 25px; text-align: center; border: 1px solid var(--accent-color);
            box-shadow: 0 0 20px rgba(255, 77, 109, 0.2);
        }

        input[type="password"] {
            padding: 12px; border-radius: 12px; border: 1px solid var(--accent-color);
            background: rgba(255, 255, 255, 0.1); color: white; width: 220px;
            text-align: center; font-size: 20px; margin-bottom: 20px; outline: none;
        }

        .login-btn {
            background: var(--accent-color); color: white; border: none;
            padding: 12px 40px; border-radius: 12px; cursor: pointer;
            font-size: 18px; font-weight: bold; transition: 0.3s;
        }

        /* المحتوى الرئيسي */
        #main-content { display: none; text-align: center; z-index: 2; padding: 20px; }

        .main-title { font-size: 45px; margin-bottom: 5px; }
        .name-highlight { color: var(--accent-color); text-shadow: 0 0 10px rgba(255, 77, 109, 0.5); }
        
        /* تنسيق الجملة الجديدة */
        .sub-title { 
            font-size: 28px; color: var(--text-sub); margin-bottom: 20px; display: block; 
            font-weight: bold;
        }

        .hug-emoji {
            display: inline-block;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        .photo-container { margin: 20px 0; position: relative; display: inline-block; }
        .our-photo {
            max-width: 250px; border-radius: 50%; border: 5px solid rgba(255, 77, 109, 0.2);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .timer-box {
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 77, 109, 0.2);
            padding: 25px; border-radius: 25px; margin-top: 20px;
        }
        .timer-display { display: flex; justify-content: center; gap: 15px; margin-top: 15px; }
        .time-unit { background: rgba(255, 77, 109, 0.1); padding: 10px; border-radius: 15px; min-width: 70px; }
        .time-value { font-size: 32px; font-weight: bold; color: var(--accent-color); }
        .time-label { font-size: 14px; color: var(--text-sub); }

        .hearts-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; overflow: hidden; z-index: 1; }
        .heart {
            position: absolute; width: 20px; height: 20px; background-color: var(--accent-color);
            opacity: 0.2; transform: rotate(-45deg); animation: float 15s infinite; border-radius: 50% 50% 0 0;

      }
        @keyframes float {
            0% { transform: translateY(100vh) rotate(-45deg); opacity: 0; }
            10% { opacity: 0.2; }
            100% { transform: translateY(-10vh) rotate(-45deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2 style="margin-top:0; color: var(--text-sub);">أدخلي كلمة السر ❤️</h2>
            <input type="password" id="passwordInput" placeholder="2008">
            <br>
            <button class="login-btn" onclick="checkPassword()">دخول</button>
            <p id="error-msg" style="color: #ff4d6d; display: none; margin-top: 15px;">كلمة السر غلط يا حبيبتي!</p>
        </div>
    </div>

    <div class="hearts-bg" id="hearts-bg"></div>

    <div id="main-content">
        <h1 class="main-title">أجمل حكاية مع <span class="name-highlight">صفاء</span></h1>
        
        <span class="sub-title">
            كل سنة وأنتي عيدي يا حبيبتي <span class="hug-emoji">🫂</span>
        </span>

        <div class="photo-container">
            <img src="our-photo.jpg" alt="صورتنا" class="our-photo" onerror="this.src='https://via.placeholder.com/250?text=Love'">
        </div>

        <div class="timer-box">
            <p>الوقت اللي عشناه سوا من (1-8-2024):</p>
            <div class="timer-display">
                <div class="time-unit"><div class="time-value" id="days">00</div><div class="time-label">يوم</div></div>
                <div class="time-unit"><div class="time-value" id="hours">00</div><div class="time-label">ساعة</div></div>
                <div class="time-unit"><div class="time-value" id="minutes">00</div><div class="time-label">دقيقة</div></div>
                <div class="time-unit"><div class="time-value" id="seconds">00</div><div class="time-label">ثانية</div></div>
            </div>
        </div>
        <p style="margin-top: 30px; font-size: 20px;">أحبكِ دائماً وأبداً ❤️</p>
    </div>

    <script>
        function checkPassword() {
            const pass = document.getElementById('passwordInput').value;
            if (pass === "2312008") {
                document.getElementById('login-screen').style.opacity = "0";
                setTimeout(() => {
                    document.getElementById('login-screen').style.display = "none";
                    document.getElementById('main-content').style.display = "block";
                    startHearts();
                }, 500);
            } else {
                document.getElementById('error-msg').style.display = "block";
            }
        }

        const startDate = new Date("August 1, 2024 00:00:00").getTime();
        function updateTimer() {
            const now = new Date().getTime();
            const diff = now - startDate;
            document.getElementById("days").innerText = Math.floor(diff / (1000 * 60 * 60 * 24));
            document.getElementById("hours").innerText = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)).toString().padStart(2, '0');
            document.getElementById("minutes").innerText = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60)).toString().padStart(2, '0');
            document.getElementById("seconds").innerText = Math.floor((diff % (1000 * 60)) / 1000).toString().padStart(2, '0');
        }
        setInterval(updateTimer, 1000);
        updateTimer();

        function startHearts() {
            const heartsBg = document.getElementById('hearts-bg');
            for (let i = 0; i < 20; i++) {
                const heart = document.createElement('div');
                heart.classList.add('heart');
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.animationDelay = Math.random() * 10 + 's';
                heart.style.transform = scale(${Math.random() * 0.6 + 0.4}) rotate(-45deg);
                heartsBg.appendChild(heart);
            }
        }
    </script>
</body>
</html>
